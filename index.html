<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>나의 대동여지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html,body { width:100%; height:100%; overflow:hidden; background:#0d0d18; font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif; }

#map-wrap { position:absolute; inset:0; z-index:1; }
#map { width:100%; height:100%; filter:grayscale(1) brightness(0.4); }
#fog-canvas { position:absolute; inset:0; z-index:400; pointer-events:none; }

#hud-top {
  position:absolute; top:0; left:0; right:0; height:56px;
  background:rgba(8,8,18,0.9); backdrop-filter:blur(12px);
  border-bottom:0.5px solid rgba(255,255,255,0.07);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 18px; z-index:1000;
}
#ham-btn { width:40px;height:40px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;background:none;border:none;cursor:pointer; }
.hline { width:20px;height:1.5px;background:rgba(255,255,255,0.75);border-radius:2px; }
#app-title { font-size:14px;font-weight:500;color:rgba(255,255,255,0.75);letter-spacing:0.5px; }

#rec-pill { display:flex;align-items:center;gap:5px;border-radius:20px;padding:5px 11px;font-size:10px;font-weight:500;cursor:pointer;transition:all 0.3s;border:0.5px solid; }
#rec-pill.recording { background:rgba(220,50,50,0.15);border-color:rgba(220,50,50,0.35);color:rgba(220,80,80,0.95); }
#rec-pill.idle      { background:rgba(240,192,64,0.12);border-color:rgba(240,192,64,0.3);color:rgba(240,192,64,0.9); }
#rec-dot { width:7px;height:7px;border-radius:50%; }
#rec-pill.recording #rec-dot { background:#e03232;animation:blink 1s infinite; }
#rec-pill.idle #rec-dot      { background:#f0c040; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

#hud-bottom {
  position:absolute; bottom:0; left:0; right:0; height:76px;
  background:rgba(8,8,18,0.92); backdrop-filter:blur(12px);
  border-top:0.5px solid rgba(255,255,255,0.07);
  display:flex; align-items:center; padding:0 24px; z-index:1000;
}
.stat-item { flex:1;display:flex;flex-direction:column;gap:3px; }
.stat-item+.stat-item { border-left:0.5px solid rgba(255,255,255,0.08);padding-left:20px; }
.stat-label { font-size:9px;color:rgba(255,255,255,0.32);letter-spacing:0.5px; }
.stat-value { font-size:16px;font-weight:500;color:rgba(255,255,255,0.85); }
.stat-value span { font-size:11px;color:rgba(255,255,255,0.35);margin-left:2px; }

#gps-toast {
  position:absolute; top:68px; left:50%; transform:translateX(-50%);
  background:rgba(14,14,28,0.95); border:0.5px solid rgba(255,255,255,0.1);
  border-radius:20px; padding:8px 16px; font-size:11px; color:rgba(255,255,255,0.6);
  z-index:1000; white-space:nowrap; transition:opacity 0.4s;
}
#gps-toast.hidden { opacity:0; pointer-events:none; }

#layer-toggle { position:absolute;bottom:88px;right:14px;z-index:1000;display:flex;flex-direction:column;gap:6px; }
.layer-btn { width:40px;height:40px;background:rgba(10,10,22,0.9);border:0.5px solid rgba(255,255,255,0.12);border-radius:10px;color:rgba(255,255,255,0.6);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center; }
.layer-btn.active { background:rgba(240,192,64,0.15);border-color:rgba(240,192,64,0.35);color:#f0c040; }

#panel { position:absolute;top:0;left:0;bottom:0;width:290px;background:rgba(10,10,20,0.97);backdrop-filter:blur(20px);z-index:2000;transform:translateX(-100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;border-right:0.5px solid rgba(255,255,255,0.06); }
#panel.open { transform:translateX(0); }
.panel-header { padding:64px 22px 20px;border-bottom:0.5px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between; }
.panel-title { font-size:20px;font-weight:500;color:rgba(255,255,255,0.88); }
#panel-close { width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.07);border:none;color:rgba(255,255,255,0.5);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center; }
.section-label { font-size:10px;font-weight:500;color:rgba(255,255,255,0.28);letter-spacing:1px;padding:18px 22px 8px; }
.cur-pos-btn { margin:0 14px 4px;background:rgba(240,192,64,0.1);border:0.5px solid rgba(240,192,64,0.25);border-radius:12px;padding:13px 16px;display:flex;align-items:center;gap:11px;cursor:pointer; }
.cur-dot { width:10px;height:10px;border-radius:50%;background:#f0c040;box-shadow:0 0 0 3px rgba(240,192,64,0.2);flex-shrink:0; }
.cur-label { font-size:14px;font-weight:500;color:#f0c040; }
#memories-list { flex:1;overflow-y:auto;padding:0 14px;display:flex;flex-direction:column;gap:5px; }
#memories-list::-webkit-scrollbar { display:none; }
.mem-btn { border:none;border-radius:12px;padding:13px 16px;display:flex;align-items:center;gap:11px;cursor:pointer;width:100%;text-align:left; }
.mem-dot { width:10px;height:10px;border-radius:50%;flex-shrink:0; }
.mem-info { flex:1; }
.mem-name { font-size:13px;font-weight:500;color:rgba(255,255,255,0.88); }
.mem-meta { font-size:10px;color:rgba(255,255,255,0.38);margin-top:2px; }
.old-memories-btn { margin:6px 14px 0;background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer; }
.old-label { font-size:13px;color:rgba(255,255,255,0.4); }
.old-count { margin-left:auto;font-size:11px;color:rgba(255,255,255,0.25); }

.player-marker { width:20px;height:20px;border-radius:50%;background:rgba(240,192,64,0.3);display:flex;align-items:center;justify-content:center;animation:pm 2s infinite; }
@keyframes pm{0%,100%{transform:scale(1)}50%{transform:scale(1.6);opacity:0.6}}
.player-inner { width:10px;height:10px;border-radius:50%;background:#f0c040; }
</style>
</head>
<body>

<div id="map-wrap">
  <div id="map"></div>
</div>
<canvas id="fog-canvas"></canvas>

<div id="hud-top">
  <button id="ham-btn" onclick="togglePanel()">
    <div class="hline"></div><div class="hline"></div><div class="hline"></div>
  </button>
  <span id="app-title">나의 대동여지도</span>
  <div id="rec-pill" class="recording" onclick="toggleRecord()">
    <div id="rec-dot"></div>
    <span id="rec-label">기록 중</span>
  </div>
</div>

<div id="gps-toast">📡 GPS 신호 찾는 중...</div>

<div id="hud-bottom">
  <div class="stat-item">
    <span class="stat-label">오늘 걸은 거리</span>
    <span class="stat-value" id="stat-total">0.00<span>km</span></span>
  </div>
  <div class="stat-item">
    <span class="stat-label">새로운 길</span>
    <span class="stat-value" id="stat-new">0.00<span>km</span></span>
  </div>
  <div class="stat-item">
    <span class="stat-label">기억</span>
    <span class="stat-value" id="stat-count">0<span>개</span></span>
  </div>
</div>

<div id="layer-toggle">
  <button class="layer-btn active" id="btn-fog" onclick="toggleFog()">🌫</button>
  <button class="layer-btn" id="btn-loc" onclick="centerOnMe()">◎</button>
</div>

<div id="panel">
  <div class="panel-header">
    <span class="panel-title">나의 대동여지도</span>
    <button id="panel-close" onclick="togglePanel()">✕</button>
  </div>
  <div class="section-label">현재</div>
  <div class="cur-pos-btn" onclick="centerOnMe();togglePanel()">
    <div class="cur-dot"></div>
    <span class="cur-label">현 위치로</span>
  </div>
  <div class="section-label">기억들</div>
  <div id="memories-list"></div>
  <div id="old-memories-btn" class="old-memories-btn" style="display:none" onclick="alert('오래된 기억: ' + oldMemories.length + '개')">
    <span class="old-label">오래된 기억들</span>
    <span class="old-count" id="old-count"></span>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

// ════════════════════════════════════════════
//  상태 — 최상단 선언으로 호이스팅 문제 방지
// ════════════════════════════════════════════
let recording     = true;
let currentLatLng = null;
let playerMarker  = null;
let accCircle     = null;
let todayLatlngs  = [];
let segmentDist   = 0;   // 현재 기록 구간 거리
let memories      = [];  // 최근 5개
let oldMemories   = [];  // 6번째 이상
let totalDist     = 0;
let newDist       = 0;
const COLORS = ['#6b9ef5','#52c4a0','#c478e0','#e06b8d','#e8a44a','#4dc8e8'];

// ════════════════════════════════════════════
//  지도 초기화
// ════════════════════════════════════════════
const map = L.map('map', { zoomControl:false, attributionControl:false });
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  maxZoom:19, subdomains:'abcd'
}).addTo(map);
map.setView([37.5340, 126.9950], 17);

// ════════════════════════════════════════════
//  안개 캔버스
// ════════════════════════════════════════════
const fog  = document.getElementById('fog-canvas');
const fctx = fog.getContext('2d');
let fogEnabled = true;

function glowRadius() {
  const lat = currentLatLng ? currentLatLng.lat : map.getCenter().lat;
  const zoom = map.getZoom();
  const mpp  = 156543.03392 * Math.cos(lat * Math.PI / 180) / Math.pow(2, zoom);
  return Math.max(20, 15 / mpp);
}

function resizeFog() {
  fog.width  = window.innerWidth;
  fog.height = window.innerHeight;
  redrawFog();
}
window.addEventListener('resize', resizeFog);

let rafPending = false;
function scheduleRedraw() {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(() => { redrawFog(); rafPending = false; });
}
map.on('move zoom moveend zoomend', scheduleRedraw);

function redrawFog() {
  const W = fog.width, H = fog.height;
  fctx.clearRect(0, 0, W, H);
  if (!fogEnabled) return;

  fctx.fillStyle = 'rgba(0,0,0,0.82)';
  fctx.fillRect(0, 0, W, H);

  fctx.save();
  fctx.globalCompositeOperation = 'destination-out';

  const r = glowRadius();
  oldMemories.forEach(m       => glowPath(m.latlngs, r * 0.80, 0.28));
  memories.slice(0,5).forEach(m => glowPath(m.latlngs, r * 0.92, 0.55));
  if (todayLatlngs.length > 0)  glowPath(todayLatlngs, r, 1.0);

  fctx.restore();
}

function glowPath(latlngs, radius, maxAlpha) {
  if (!latlngs || latlngs.length === 0) return;
  latlngs.forEach(ll => {
    const p    = map.latLngToContainerPoint(ll);
    const grad = fctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, radius);
    grad.addColorStop(0,    `rgba(0,0,0,${maxAlpha})`);
    grad.addColorStop(0.55, `rgba(0,0,0,${maxAlpha * 0.45})`);
    grad.addColorStop(1,    'rgba(0,0,0,0)');
    fctx.fillStyle = grad;
    fctx.beginPath();
    fctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
    fctx.fill();
  });
}

// ════════════════════════════════════════════
//  플레이어 마커
// ════════════════════════════════════════════
function setPlayerMarker(ll) {
  if (!playerMarker) {
    const el = document.createElement('div');
    el.className = 'player-marker';
    el.innerHTML = '<div class="player-inner"></div>';
    const icon = L.divIcon({ html:el, className:'', iconSize:[20,20], iconAnchor:[10,10] });
    playerMarker = L.marker(ll, { icon, zIndexOffset:1000 }).addTo(map);
  } else {
    playerMarker.setLatLng(ll);
  }
}

// ════════════════════════════════════════════
//  거리 계산
// ════════════════════════════════════════════
function haversine(a, b) {
  const R=6371000, φ1=a.lat*Math.PI/180, φ2=b.lat*Math.PI/180;
  const Δφ=(b.lat-a.lat)*Math.PI/180, Δλ=(b.lng-a.lng)*Math.PI/180;
  const x=Math.sin(Δφ/2)**2+Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ════════════════════════════════════════════
//  위치 처리
// ════════════════════════════════════════════
function handlePosition(ll) {
  if (!currentLatLng) map.setView(ll, 17);
  setPlayerMarker(ll);

  if (recording) {
    if (currentLatLng) {
      const d = haversine(currentLatLng, ll);
      if (d > 10) {
        totalDist   += d;
        segmentDist += d;          // 구간 거리 누적
        newDist     += d * 0.65;
        todayLatlngs.push(ll);
        updateStats();
        scheduleRedraw();
      }
    } else {
      todayLatlngs.push(ll);
      scheduleRedraw();
    }
  }
  currentLatLng = ll;
}

// ════════════════════════════════════════════
//  GPS
// ════════════════════════════════════════════
function startGPS() {
  if (!navigator.geolocation) { startSim(); return; }
  showToast('📡 GPS 신호 찾는 중...');
  navigator.geolocation.watchPosition(
    pos => {
      if (pos.coords.accuracy > 30) {
        // 정확도 나쁠 때 accCircle 크기만 갱신하고 위치는 무시
        if (accCircle) accCircle.setRadius(pos.coords.accuracy);
        return;
      }
      hideToast();
      const ll = L.latLng(pos.coords.latitude, pos.coords.longitude);
      if (accCircle) accCircle.setLatLng(ll).setRadius(pos.coords.accuracy);
      else accCircle = L.circle(ll, {
        radius: pos.coords.accuracy,
        color:'rgba(240,192,64,0.4)', fillColor:'rgba(240,192,64,0.06)',
        fillOpacity:1, weight:1
      }).addTo(map);
      handlePosition(ll);
    },
    err => {
      // 권한 거부(1) vs 타임아웃(3) 구분
      const msg = err.code === 1
        ? '⚠️ 위치 권한이 거부됨 → 시뮬레이션 모드'
        : '⚠️ GPS 신호 없음 → 시뮬레이션 모드';
      showToast(msg);
      setTimeout(startSim, 1200);
    },
    { enableHighAccuracy:true, maximumAge:3000, timeout:15000 }
  );
}

// ════════════════════════════════════════════
//  시뮬레이션
// ════════════════════════════════════════════
function startSim() {
  hideToast();
  showToast('🚶 시뮬레이션 모드 (실제 폰에서는 GPS 자동 사용)');
  setTimeout(hideToast, 3500);

  const route = [
    [37.53400,126.99500],[37.53414,126.99518],[37.53428,126.99535],
    [37.53442,126.99520],[37.53456,126.99508],[37.53470,126.99524],
    [37.53484,126.99542],[37.53496,126.99558],[37.53506,126.99543],
    [37.53518,126.99527],[37.53530,126.99513],[37.53544,126.99528],
    [37.53558,126.99545],[37.53570,126.99561],[37.53580,126.99547],
    [37.53592,126.99531],[37.53606,126.99516],[37.53620,126.99530],
    [37.53634,126.99548],[37.53646,126.99564],[37.53656,126.99549],
    [37.53668,126.99533],[37.53682,126.99518],[37.53696,126.99532],
  ];

  let i = 0;
  function step() {
    if (!recording) { setTimeout(step, 800); return; }
    if (i < route.length) {
      handlePosition(L.latLng(route[i][0], route[i][1]));
      i++;
      setTimeout(step, 600);
    }
    // 한 바퀴만 실행 — 무한 누적 없음
  }
  step();
}

// ════════════════════════════════════════════
//  기록 토글
// ════════════════════════════════════════════
function toggleRecord() {
  recording = !recording;
  document.getElementById('rec-label').textContent = recording ? '기록 중' : '기록 시작';
  document.getElementById('rec-pill').className    = recording ? 'recording' : 'idle';

  if (recording) {
    currentLatLng = null; // 재시작 시 기준점 초기화
    segmentDist   = 0;    // 새 구간 시작
  } else {
    if (todayLatlngs.length > 2) {
      saveMemory();
      todayLatlngs = [];
      segmentDist  = 0;
      scheduleRedraw(); // 기억 저장 후 화면 갱신
    }
  }
}

// ════════════════════════════════════════════
//  기억 저장 & 렌더링
// ════════════════════════════════════════════
function saveMemory() {
  const now = new Date();
  const mem = {
    color:   COLORS[memories.length % COLORS.length],
    name:    '기억 ' + (memories.length + oldMemories.length + 1),
    time:    now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0'),
    km:      (segmentDist / 1000).toFixed(2), // 구간 거리만 저장
    latlngs: [...todayLatlngs],
  };

  memories.unshift(mem);

  // 5개 초과 시 oldMemories로 이동
  if (memories.length > 5) {
    oldMemories.unshift(memories.pop());
  }

  saveToStorage();
  renderMemories();
  updateStats();
}

function renderMemories() {
  const list = document.getElementById('memories-list');
  list.innerHTML = '';

  memories.forEach(mem => {
    const d = document.createElement('div');
    d.className = 'mem-btn';
    d.style.background = hexA(mem.color, .13);
    d.style.border     = '0.5px solid ' + hexA(mem.color, .28);
    d.innerHTML = `
      <div class="mem-dot" style="background:${mem.color};box-shadow:0 0 0 3px ${hexA(mem.color,.2)}"></div>
      <div class="mem-info">
        <div class="mem-name">${mem.name}</div>
        <div class="mem-meta">${mem.time} · ${mem.km}km</div>
      </div>`;
    d.onclick = () => {
      if (mem.latlngs.length) map.setView(mem.latlngs[mem.latlngs.length - 1], 17);
      togglePanel();
    };
    list.appendChild(d);
  });

  // 오래된 기억 버튼
  const oldBtn = document.getElementById('old-memories-btn');
  if (oldMemories.length > 0) {
    oldBtn.style.display = 'flex';
    document.getElementById('old-count').textContent = oldMemories.length + '개';
  } else {
    oldBtn.style.display = 'none';
  }
}

// ════════════════════════════════════════════
//  localStorage
// ════════════════════════════════════════════
function saveToStorage() {
  try {
    const serialize = arr => arr.map(m => ({
      ...m, latlngs: m.latlngs.map(ll => [ll.lat, ll.lng])
    }));
    localStorage.setItem('daedong_v2', JSON.stringify({
      memories:    serialize(memories),
      oldMemories: serialize(oldMemories),
      totalDist, newDist
    }));
  } catch(e) { console.warn('storage save failed', e); }
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem('daedong_v2');
    if (!raw) return;
    const data = JSON.parse(raw);
    const deserialize = arr => (arr || []).map(m => ({
      ...m, latlngs: m.latlngs.map(([lat,lng]) => L.latLng(lat, lng))
    }));
    memories    = deserialize(data.memories);
    oldMemories = deserialize(data.oldMemories);
    totalDist   = data.totalDist || 0;
    newDist     = data.newDist   || 0;
    renderMemories();
    updateStats();
    scheduleRedraw();
  } catch(e) { console.warn('storage load failed', e); }
}

// ════════════════════════════════════════════
//  유틸
// ════════════════════════════════════════════
function hexA(h, a) {
  const r=parseInt(h.slice(1,3),16), g=parseInt(h.slice(3,5),16), b=parseInt(h.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function updateStats() {
  document.getElementById('stat-total').innerHTML = (totalDist/1000).toFixed(2) + '<span>km</span>';
  document.getElementById('stat-new').innerHTML   = (newDist/1000).toFixed(2)   + '<span>km</span>';
  document.getElementById('stat-count').innerHTML = (memories.length + oldMemories.length) + '<span>개</span>';
}

function togglePanel() { document.getElementById('panel').classList.toggle('open'); }
function centerOnMe()  { if (currentLatLng) map.setView(currentLatLng, 17); }

function toggleFog() {
  fogEnabled = !fogEnabled;
  document.getElementById('btn-fog').classList.toggle('active', fogEnabled);
  redrawFog();
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('gps-toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(toastTimer);
}
function hideToast() {
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => document.getElementById('gps-toast').classList.add('hidden'), 300);
}

});
