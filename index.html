<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>나의 대동여지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html,body { width:100%; height:100%; overflow:hidden; background:#0d0d18; font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif; }

#map-wrap { position:absolute; inset:0; z-index:1; }
#map { width:100%; height:100%; filter:grayscale(1) brightness(0.4); }
#fog-canvas { position:absolute; inset:0; z-index:400; pointer-events:none; }

/* ── 햄버거 버튼 (좌상단) ── */
#ham-btn {
  position:absolute; top:16px; left:16px; z-index:1000;
  width:46px; height:46px;
  background:rgba(10,10,20,0.88);
  border:0.5px solid rgba(255,255,255,0.14);
  border-radius:13px; cursor:pointer;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:5px;
  backdrop-filter:blur(10px);
  transition:background 0.2s;
}
#ham-btn:active { background:rgba(30,30,50,0.95); }
.hline { width:20px; height:1.5px; background:rgba(255,255,255,0.82); border-radius:2px; }

/* ── 상단 중앙 기록 상태 ── */
#rec-status {
  position:absolute; top:16px; left:50%; transform:translateX(-50%);
  z-index:1000;
  display:flex; align-items:center; gap:7px;
  background:rgba(10,10,20,0.88); backdrop-filter:blur(10px);
  border:0.5px solid rgba(220,50,50,0.25);
  border-radius:22px; padding:7px 16px;
  transition:opacity 0.3s;
}
#rec-status.hidden { opacity:0; pointer-events:none; }
#rec-blink {
  width:7px; height:7px; border-radius:50%;
  background:#e03232; animation:blink 1s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
#rec-status-text { font-size:11px; font-weight:500; color:rgba(255,255,255,0.72); letter-spacing:0.3px; }

/* ── GPS 토스트 ── */
#gps-toast {
  position:absolute; top:74px; left:50%; transform:translateX(-50%);
  background:rgba(14,14,28,0.95); border:0.5px solid rgba(255,255,255,0.1);
  border-radius:22px; padding:8px 18px; font-size:11px; color:rgba(255,255,255,0.6);
  z-index:1000; white-space:nowrap; transition:opacity 0.4s;
}
#gps-toast.hidden { opacity:0; pointer-events:none; }

/* ── 우하단 컨트롤 버튼 ── */
#controls {
  position:absolute; bottom:90px; right:18px;
  z-index:1000;
  display:flex; flex-direction:column; align-items:center; gap:12px;
}

/* 기록 버튼 */
#rec-btn {
  width:54px; height:54px; border-radius:50%;
  background:rgba(10,10,20,0.88);
  border:0.5px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(10px);
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:transform 0.15s, background 0.2s;
}
#rec-btn:active { transform:scale(0.91); }

/* 삼각형 = 기록 중 (누르면 중단) */
.icon-triangle {
  width:0; height:0;
  border-top:9px solid transparent;
  border-bottom:9px solid transparent;
  border-left:17px solid #e03232;
  margin-left:4px;
}
/* 네모 = 중단됨 (누르면 기록 시작) */
.icon-square {
  width:17px; height:17px;
  background:#e03232;
  border-radius:3px;
}

/* 위치 버튼 (노란 원) */
#loc-btn {
  width:54px; height:54px; border-radius:50%;
  background:rgba(10,10,20,0.88);
  border:2.5px solid #f0c040;
  backdrop-filter:blur(10px);
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:transform 0.15s, background 0.2s;
}
#loc-btn:active { transform:scale(0.91); }
#loc-btn.following { background:rgba(240,192,64,0.15); }
.loc-ring {
  width:22px; height:22px; border-radius:50%;
  border:2.5px solid #f0c040;
  display:flex; align-items:center; justify-content:center;
}
.loc-dot { width:8px; height:8px; border-radius:50%; background:#f0c040; }

/* ── 하단 통계바 ── */
#hud-bottom {
  position:absolute; bottom:0; left:0; right:0; height:74px;
  background:rgba(8,8,18,0.93); backdrop-filter:blur(12px);
  border-top:0.5px solid rgba(255,255,255,0.07);
  display:flex; align-items:center; padding:0 26px; z-index:999;
}
.stat-item { flex:1; display:flex; flex-direction:column; gap:3px; }
.stat-item+.stat-item { border-left:0.5px solid rgba(255,255,255,0.08); padding-left:22px; }
.stat-label { font-size:9px; color:rgba(255,255,255,0.3); letter-spacing:0.5px; }
.stat-value { font-size:16px; font-weight:500; color:rgba(255,255,255,0.86); }
.stat-value span { font-size:11px; color:rgba(255,255,255,0.33); margin-left:2px; }

/* ── 현재 위치 마커 (동심원 노란 원) ── */
.player-wrap {
  width:28px; height:28px;
  position:relative;
  display:flex; align-items:center; justify-content:center;
}
.player-ring {
  position:absolute;
  width:28px; height:28px; border-radius:50%;
  border:2px solid #f0c040;
  animation:ring-out 2.2s ease-out infinite;
  opacity:0;
}
.player-ring:nth-child(2) { animation-delay:0.75s; }
@keyframes ring-out {
  0%   { transform:scale(0.4); opacity:0.9; }
  100% { transform:scale(1.7); opacity:0; }
}
.player-core {
  width:13px; height:13px; border-radius:50%;
  background:#f0c040;
  border:2.5px solid rgba(255,255,255,0.92);
  box-shadow:0 0 8px rgba(240,192,64,0.9);
  z-index:1; position:relative;
}

/* ── 사이드 패널 ── */
#panel {
  position:absolute; top:0; left:0; bottom:0; width:288px;
  background:rgba(9,9,18,0.97); backdrop-filter:blur(22px);
  z-index:2000; transform:translateX(-100%);
  transition:transform 0.34s cubic-bezier(0.4,0,0.2,1);
  display:flex; flex-direction:column;
  border-right:0.5px solid rgba(255,255,255,0.06);
}
#panel.open { transform:translateX(0); }

/* 패널 오버레이 (패널 열리면 뒤 영역 클릭 시 닫힘) */
#panel-overlay {
  position:absolute; inset:0; z-index:1999;
  display:none;
}
#panel-overlay.show { display:block; }

.panel-hd {
  padding:58px 20px 18px;
  border-bottom:0.5px solid rgba(255,255,255,0.06);
  display:flex; align-items:center; justify-content:space-between;
}
.panel-title { font-size:18px; font-weight:500; color:rgba(255,255,255,0.9); }
#panel-close {
  width:30px; height:30px; border-radius:50%;
  background:rgba(255,255,255,0.07); border:none;
  color:rgba(255,255,255,0.5); font-size:15px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
}

/* 패널 상단 액션 버튼 영역 */
.panel-actions { padding:14px 14px 0; display:flex; flex-direction:column; gap:7px; }

/* 기록 버튼 (노란/어두운) */
#panel-rec-btn {
  display:flex; align-items:center; gap:13px;
  border:none; border-radius:14px;
  padding:15px 18px; cursor:pointer; width:100%;
  transition:filter 0.2s, background 0.3s;
}
#panel-rec-btn:active { filter:brightness(0.92); }
#panel-rec-arrow { flex-shrink:0; }
#panel-rec-label { font-size:15px; font-weight:500; }

/* 현 위치로 버튼 */
#panel-loc-btn {
  display:flex; align-items:center; gap:13px;
  background:rgba(240,192,64,0.1);
  border:0.5px solid rgba(240,192,64,0.28);
  border-radius:14px; padding:14px 18px; cursor:pointer;
  transition:background 0.2s;
}
#panel-loc-btn:active { background:rgba(240,192,64,0.18); }
.ploc-icon {
  width:18px; height:18px; border-radius:50%;
  border:2px solid #f0c040;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.ploc-dot { width:7px; height:7px; border-radius:50%; background:#f0c040; }
.ploc-label { font-size:14px; font-weight:500; color:#f0c040; }

/* 기억 목록 */
.section-lbl {
  font-size:10px; font-weight:500; color:rgba(255,255,255,0.26);
  letter-spacing:1px; padding:18px 20px 7px;
}
#memories-list {
  flex:1; overflow-y:auto; padding:0 14px;
  display:flex; flex-direction:column; gap:5px;
}
#memories-list::-webkit-scrollbar { display:none; }
.mem-btn {
  border:none; border-radius:12px; padding:13px 16px;
  display:flex; align-items:center; gap:11px;
  cursor:pointer; width:100%; text-align:left;
  transition:filter 0.2s;
}
.mem-btn:active { filter:brightness(1.15); }
.mem-dot { width:11px; height:11px; border-radius:50%; flex-shrink:0; }
.mem-info { flex:1; }
.mem-name { font-size:13px; font-weight:500; color:rgba(255,255,255,0.88); }
.mem-meta { font-size:10px; color:rgba(255,255,255,0.36); margin-top:2px; }

/* 오래된 기억들 버튼 */
#old-btn {
  margin:5px 14px 16px;
  background:rgba(255,255,255,0.04);
  border:0.5px solid rgba(255,255,255,0.09);
  border-radius:12px; padding:12px 16px;
  display:none; align-items:center; gap:10px; cursor:pointer;
}
.old-dots { display:grid; grid-template-columns:1fr 1fr; gap:3px; flex-shrink:0; }
.old-dot-sm { width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,0.25); }
.old-lbl { font-size:13px; color:rgba(255,255,255,0.38); }
.old-cnt { margin-left:auto; font-size:11px; color:rgba(255,255,255,0.22); }
</style>
</head>
<body>

<div id="map-wrap"><div id="map"></div></div>
<canvas id="fog-canvas"></canvas>
<div id="panel-overlay" onclick="closePanel()"></div>

<!-- 좌상단 햄버거 -->
<button id="ham-btn" onclick="togglePanel()">
  <div class="hline"></div><div class="hline"></div><div class="hline"></div>
</button>

<!-- 상단 중앙 기록 상태 -->
<div id="rec-status">
  <div id="rec-blink"></div>
  <span id="rec-status-text">기록 중</span>
</div>

<!-- GPS 토스트 -->
<div id="gps-toast" class="hidden"></div>

<!-- 우하단 컨트롤 -->
<div id="controls">
  <button id="rec-btn" onclick="toggleRecord()" title="기록 중단/시작">
    <div id="rec-icon" class="icon-triangle"></div>
  </button>
  <button id="loc-btn" onclick="centerOnMe()" title="현재 위치로">
    <div class="loc-ring"><div class="loc-dot"></div></div>
  </button>
</div>

<!-- 하단 통계 -->
<div id="hud-bottom">
  <div class="stat-item">
    <span class="stat-label">오늘 걸은 거리</span>
    <span class="stat-value" id="stat-total">0.00<span>km</span></span>
  </div>
  <div class="stat-item">
    <span class="stat-label">새로운 길</span>
    <span class="stat-value" id="stat-new">0.00<span>km</span></span>
  </div>
  <div class="stat-item">
    <span class="stat-label">기억</span>
    <span class="stat-value" id="stat-count">0<span>개</span></span>
  </div>
</div>

<!-- 사이드 패널 -->
<div id="panel">
  <div class="panel-hd">
    <span class="panel-title">나의 대동여지도</span>
    <button id="panel-close" onclick="closePanel()">✕</button>
  </div>

  <div class="panel-actions">
    <!-- 기록 토글 버튼 (노란색) -->
    <button id="panel-rec-btn" onclick="toggleRecord(); closePanel();">
      <div id="panel-rec-arrow"></div>
      <span id="panel-rec-label">기록 중단</span>
    </button>
    <!-- 현 위치로 -->
    <div id="panel-loc-btn" onclick="centerOnMe(); closePanel();">
      <div class="ploc-icon"><div class="ploc-dot"></div></div>
      <span class="ploc-label">현 위치로</span>
    </div>
  </div>

  <div class="section-lbl">기억들</div>
  <div id="memories-list"></div>
  <div id="old-btn" onclick="showOldMemories()">
    <div class="old-dots">
      <div class="old-dot-sm"></div><div class="old-dot-sm"></div>
      <div class="old-dot-sm"></div><div class="old-dot-sm"></div>
    </div>
    <span class="old-lbl">오래된 기억들</span>
    <span class="old-cnt" id="old-cnt"></span>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ══════════════════════════════════════
//  상태 (최상단 선언)
// ══════════════════════════════════════
let recording     = true;
let currentLatLng = null;
let playerMarker  = null;
let accCircle     = null;
let todayLatlngs  = [];
let segmentDist   = 0;
let memories      = [];
let oldMemories   = [];
let totalDist     = 0;
let newDist       = 0;
let followMode    = false;
const COLORS = ['#6b9ef5','#52c4a0','#c478e0','#e06b8d','#e8a44a','#4dc8e8'];

// ══════════════════════════════════════
//  지도
// ══════════════════════════════════════
const map = L.map('map', { zoomControl:false, attributionControl:false });
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  maxZoom:19, subdomains:'abcd'
}).addTo(map);
map.setView([37.5340, 126.9950], 17);

// 사용자 드래그 시 followMode 해제
map.on('dragstart', () => {
  followMode = false;
  document.getElementById('loc-btn').classList.remove('following');
});

// ══════════════════════════════════════
//  안개 캔버스
// ══════════════════════════════════════
const fog  = document.getElementById('fog-canvas');
const fctx = fog.getContext('2d');
let fogEnabled = true;

function glowRadius() {
  const lat  = currentLatLng ? currentLatLng.lat : map.getCenter().lat;
  const zoom = map.getZoom();
  const mpp  = 156543.03392 * Math.cos(lat * Math.PI / 180) / Math.pow(2, zoom);
  return Math.max(20, 15 / mpp);
}

function resizeFog() {
  fog.width  = window.innerWidth;
  fog.height = window.innerHeight;
  redrawFog();
}
window.addEventListener('resize', resizeFog);

let rafPending = false;
function scheduleRedraw() {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(() => { redrawFog(); rafPending = false; });
}
map.on('move zoom moveend zoomend', scheduleRedraw);

function redrawFog() {
  const W = fog.width, H = fog.height;
  fctx.clearRect(0, 0, W, H);
  if (!fogEnabled) return;

  fctx.fillStyle = 'rgba(0,0,0,0.82)';
  fctx.fillRect(0, 0, W, H);

  fctx.save();
  fctx.globalCompositeOperation = 'destination-out';
  const r = glowRadius();
  oldMemories.forEach(m         => glowPath(m.latlngs, r * 0.80, 0.28));
  memories.forEach(m            => glowPath(m.latlngs, r * 0.92, 0.55));
  if (todayLatlngs.length > 0)    glowPath(todayLatlngs, r, 1.0);
  fctx.restore();
}

function glowPath(latlngs, radius, maxAlpha) {
  if (!latlngs || latlngs.length === 0) return;
  latlngs.forEach(ll => {
    const p    = map.latLngToContainerPoint(ll);
    const grad = fctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, radius);
    grad.addColorStop(0,    `rgba(0,0,0,${maxAlpha})`);
    grad.addColorStop(0.55, `rgba(0,0,0,${maxAlpha * 0.45})`);
    grad.addColorStop(1,    'rgba(0,0,0,0)');
    fctx.fillStyle = grad;
    fctx.beginPath();
    fctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
    fctx.fill();
  });
}

// ══════════════════════════════════════
//  플레이어 마커 (동심원 노란 원)
// ══════════════════════════════════════
function setPlayerMarker(ll) {
  if (!playerMarker) {
    const el = document.createElement('div');
    el.className = 'player-wrap';
    el.innerHTML = `
      <div class="player-ring"></div>
      <div class="player-ring"></div>
      <div class="player-core"></div>`;
    const icon = L.divIcon({
      html: el, className: '',
      iconSize: [28, 28], iconAnchor: [14, 14]
    });
    playerMarker = L.marker(ll, { icon, zIndexOffset:1000 }).addTo(map);
  } else {
    playerMarker.setLatLng(ll);
  }
}

// ══════════════════════════════════════
//  거리 계산 (Haversine)
// ══════════════════════════════════════
function haversine(a, b) {
  const R=6371000, φ1=a.lat*Math.PI/180, φ2=b.lat*Math.PI/180;
  const Δφ=(b.lat-a.lat)*Math.PI/180, Δλ=(b.lng-a.lng)*Math.PI/180;
  const x=Math.sin(Δφ/2)**2+Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ══════════════════════════════════════
//  위치 처리 (GPS·시뮬 공통)
// ══════════════════════════════════════
function handlePosition(ll) {
  // 첫 위치: 지도 이동 후 followMode 끔 (사용자가 직접 볼 수 있게)
  if (!currentLatLng) {
    map.setView(ll, 17);
    followMode = false;
  } else if (followMode) {
    map.setView(ll, map.getZoom(), { animate:true, duration:0.3 });
  }

  setPlayerMarker(ll);

  if (recording) {
    if (currentLatLng) {
      const d = haversine(currentLatLng, ll);
      if (d > 10) {
        totalDist   += d;
        segmentDist += d;
        newDist     += d * 0.65;
        todayLatlngs.push(ll);
        updateStats();
        scheduleRedraw();
      }
    } else {
      todayLatlngs.push(ll);
      scheduleRedraw();
    }
  }
  currentLatLng = ll;
}

// ══════════════════════════════════════
//  GPS
// ══════════════════════════════════════
function startGPS() {
  if (!navigator.geolocation) { startSim(); return; }
  showToast('📡 GPS 신호 찾는 중...');
  navigator.geolocation.watchPosition(
    pos => {
      if (pos.coords.accuracy > 30) {
        if (accCircle) accCircle.setRadius(pos.coords.accuracy);
        return;
      }
      hideToast();
      const ll = L.latLng(pos.coords.latitude, pos.coords.longitude);
      if (accCircle) accCircle.setLatLng(ll).setRadius(pos.coords.accuracy);
      else accCircle = L.circle(ll, {
        radius: pos.coords.accuracy,
        color:'rgba(240,192,64,0.35)', fillColor:'rgba(240,192,64,0.05)',
        fillOpacity:1, weight:1
      }).addTo(map);
      handlePosition(ll);
    },
    err => {
      showToast(err.code === 1
        ? '⚠️ 위치 권한 거부 → 시뮬레이션 모드'
        : '⚠️ GPS 신호 없음 → 시뮬레이션 모드');
      setTimeout(startSim, 1200);
    },
    { enableHighAccuracy:true, maximumAge:3000, timeout:15000 }
  );
}

// ══════════════════════════════════════
//  시뮬레이션 (GPS 없을 때)
// ══════════════════════════════════════
function startSim() {
  hideToast();
  showToast('🚶 시뮬레이션 모드');
  setTimeout(hideToast, 3000);

  const route = [
    [37.53400,126.99500],[37.53414,126.99518],[37.53428,126.99535],
    [37.53442,126.99520],[37.53456,126.99508],[37.53470,126.99524],
    [37.53484,126.99542],[37.53496,126.99558],[37.53506,126.99543],
    [37.53518,126.99527],[37.53530,126.99513],[37.53544,126.99528],
    [37.53558,126.99545],[37.53570,126.99561],[37.53580,126.99547],
    [37.53592,126.99531],[37.53606,126.99516],[37.53620,126.99530],
    [37.53634,126.99548],[37.53646,126.99564],[37.53656,126.99549],
    [37.53668,126.99533],[37.53682,126.99518],[37.53696,126.99532],
  ];
  let i = 0;
  function step() {
    if (!recording) { setTimeout(step, 800); return; }
    if (i < route.length) {
      handlePosition(L.latLng(route[i][0], route[i][1]));
      i++;
      setTimeout(step, 600);
    }
    // 한 번만 실행 — 무한 누적 없음
  }
  step();
}

// ══════════════════════════════════════
//  기록 토글
// ══════════════════════════════════════
function toggleRecord() {
  recording = !recording;

  if (recording) {
    // 기록 재시작
    currentLatLng = null;
    segmentDist   = 0;
  } else {
    // 기록 중단 → 기억 저장
    if (todayLatlngs.length > 2) {
      saveMemory();
      todayLatlngs = [];
      segmentDist  = 0;
      scheduleRedraw();
    }
  }
  updateRecUI();
}

function updateRecUI() {
  const icon        = document.getElementById('rec-icon');
  const status      = document.getElementById('rec-status');
  const panelBtn    = document.getElementById('panel-rec-btn');
  const panelArrow  = document.getElementById('panel-rec-arrow');
  const panelLabel  = document.getElementById('panel-rec-label');

  if (recording) {
    // 우하단: 빨간 삼각형 (누르면 중단)
    icon.className = 'icon-triangle';
    // 상단 기록 중 표시
    status.classList.remove('hidden');
    // 패널 버튼: 노란 배경 + 왼쪽 화살표 (◀ 기록 중단)
    panelBtn.style.cssText = 'background:#f0c040;border:none;border-radius:14px;padding:15px 18px;cursor:pointer;width:100%;display:flex;align-items:center;gap:13px;';
    panelArrow.style.cssText = 'width:0;height:0;border-top:8px solid transparent;border-bottom:8px solid transparent;border-right:14px solid rgba(26,20,10,0.85);flex-shrink:0;';
    panelLabel.style.cssText = 'font-size:15px;font-weight:500;color:rgba(26,20,10,0.9);';
    panelLabel.textContent   = '기록 중단';
  } else {
    // 우하단: 빨간 네모 (누르면 기록 시작)
    icon.className = 'icon-square';
    // 상단 기록 표시 숨김
    status.classList.add('hidden');
    // 패널 버튼: 어두운 배경 + 오른쪽 화살표 (▶ 기록 시작)
    panelBtn.style.cssText = 'background:rgba(240,192,64,0.12);border:0.5px solid rgba(240,192,64,0.3);border-radius:14px;padding:15px 18px;cursor:pointer;width:100%;display:flex;align-items:center;gap:13px;';
    panelArrow.style.cssText = 'width:0;height:0;border-top:8px solid transparent;border-bottom:8px solid transparent;border-left:14px solid #f0c040;flex-shrink:0;';
    panelLabel.style.cssText = 'font-size:15px;font-weight:500;color:#f0c040;';
    panelLabel.textContent   = '기록 시작';
  }
}

// ══════════════════════════════════════
//  현재 위치로 (위치 버튼)
// ══════════════════════════════════════
function centerOnMe() {
  if (!currentLatLng) return;
  followMode = true;
  document.getElementById('loc-btn').classList.add('following');
  map.setView(currentLatLng, map.getZoom(), { animate:true, duration:0.4 });
}

// ══════════════════════════════════════
//  패널 열기/닫기
// ══════════════════════════════════════
function togglePanel() {
  const panel   = document.getElementById('panel');
  const overlay = document.getElementById('panel-overlay');
  const isOpen  = panel.classList.contains('open');
  if (isOpen) closePanel();
  else {
    panel.classList.add('open');
    overlay.classList.add('show');
  }
}
function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('panel-overlay').classList.remove('show');
}

// ══════════════════════════════════════
//  기억 저장
// ══════════════════════════════════════
function saveMemory() {
  const now = new Date();
  const mem = {
    color:   COLORS[(memories.length + oldMemories.length) % COLORS.length],
    name:    '기억 ' + (memories.length + oldMemories.length + 1),
    time:    now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0'),
    km:      (segmentDist / 1000).toFixed(2),
    latlngs: [...todayLatlngs],
  };
  memories.unshift(mem);
  if (memories.length > 5) oldMemories.unshift(memories.pop());
  saveToStorage();
  renderMemories();
  updateStats();
}

function renderMemories() {
  const list = document.getElementById('memories-list');
  list.innerHTML = '';
  memories.forEach(mem => {
    const el = document.createElement('div');
    el.className = 'mem-btn';
    el.style.background = hexA(mem.color, .12);
    el.style.border     = '0.5px solid ' + hexA(mem.color, .28);
    el.innerHTML = `
      <div class="mem-dot" style="background:${mem.color};box-shadow:0 0 0 3px ${hexA(mem.color,.18)}"></div>
      <div class="mem-info">
        <div class="mem-name">${mem.name}</div>
        <div class="mem-meta">${mem.time} · ${mem.km}km</div>
      </div>`;
    el.onclick = () => {
      if (mem.latlngs.length) map.setView(mem.latlngs[mem.latlngs.length-1], 17);
      closePanel();
    };
    list.appendChild(el);
  });

  const oldBtn = document.getElementById('old-btn');
  if (oldMemories.length > 0) {
    oldBtn.style.display = 'flex';
    document.getElementById('old-cnt').textContent = oldMemories.length + '개';
  } else {
    oldBtn.style.display = 'none';
  }
}

function showOldMemories() {
  // 추후 확장: 별도 화면으로 이동
  alert(`오래된 기억 ${oldMemories.length}개가 저장되어 있어요.`);
}

// ══════════════════════════════════════
//  localStorage
// ══════════════════════════════════════
function saveToStorage() {
  try {
    const s = arr => arr.map(m => ({ ...m, latlngs: m.latlngs.map(ll => [ll.lat, ll.lng]) }));
    localStorage.setItem('daedong_v3', JSON.stringify({
      memories: s(memories), oldMemories: s(oldMemories), totalDist, newDist
    }));
  } catch(e) {}
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem('daedong_v3');
    if (!raw) return;
    const data = JSON.parse(raw);
    const d = arr => (arr||[]).map(m => ({ ...m, latlngs: m.latlngs.map(([a,b]) => L.latLng(a,b)) }));
    memories    = d(data.memories);
    oldMemories = d(data.oldMemories);
    totalDist   = data.totalDist || 0;
    newDist     = data.newDist   || 0;
    renderMemories(); updateStats(); scheduleRedraw();
  } catch(e) {}
}

// ══════════════════════════════════════
//  유틸
// ══════════════════════════════════════
function hexA(h, a) {
  const r=parseInt(h.slice(1,3),16), g=parseInt(h.slice(3,5),16), b=parseInt(h.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function updateStats() {
  document.getElementById('stat-total').innerHTML = (totalDist/1000).toFixed(2)+'<span>km</span>';
  document.getElementById('stat-new').innerHTML   = (newDist/1000).toFixed(2)  +'<span>km</span>';
  document.getElementById('stat-count').innerHTML = (memories.length+oldMemories.length)+'<span>개</span>';
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('gps-toast');
  t.textContent = msg; t.classList.remove('hidden');
  clearTimeout(toastTimer);
}
function hideToast() {
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => document.getElementById('gps-toast').classList.add('hidden'), 300);
}

// ══════════════════════════════════════
//  시작
// ══════════════════════════════════════
resizeFog();
updateRecUI();
map.whenReady(() => {
  loadFromStorage();
  startGPS();
});
</script>
</body>
</html>
