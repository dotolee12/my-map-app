<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>New Daedongyeojido</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html,body { width:100%; height:100%; overflow:hidden; background:#1a1a1a; font-family: sans-serif; }

/* 지도 배경 */
#map { position:absolute; inset:0; z-index:1; filter: brightness(0.3) grayscale(0.5); }
#fog-canvas { position:absolute; inset:0; z-index:400; pointer-events:none; }

/* 상단 햄버거 버튼 */
#ham-btn {
    position: absolute; top: 20px; left: 20px; z-index: 1000;
    width: 45px; height: 35px; background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; justify-content: space-between;
}
.hline { width: 100%; height: 4px; background: #ccc; border-radius: 2px; }

/* 우측 상단 중단 버튼 (평상시 숨김, 기록 중일 때만 표시 가능) */
#stop-btn {
    position: absolute; top: 20px; right: 20px; z-index: 1000;
    background: #1a1a1a; color: white; border: 1px solid #444;
    padding: 10px 20px; border-radius: 8px; display: flex; align-items: center; gap: 10px;
    font-weight: bold; font-size: 16px;
}
.stop-icon { width: 15px; height: 15px; background: red; border-radius: 2px; }

/* 하단 통계창 (이미지 스타일) */
#stats-panel {
    position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
    width: 250px; background: #e0e0e0; padding: 15px; border: 1px solid #999;
    z-index: 1000; font-size: 14px; line-height: 1.6; color: #333;
}

/* 우측 하단 플로팅 버튼 */
#floating-btns { position: absolute; bottom: 30px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 15px; align-items: center; }
#btn-red-tri { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-bottom: 25px solid red; cursor: pointer; }
#btn-loc-circle { 
    width: 40px; height: 40px; background: black; border: 3px solid yellow; border-radius: 50%; 
    display: flex; align-items: center; justify-content: center; cursor: pointer;
}
.inner-dot { width: 8px; height: 8px; background: yellow; border-radius: 50%; }

/* 햄버거 메뉴 패널 */
#panel {
    position: absolute; top: 0; left: 0; width: 280px; height: 100%;
    background: #ccc; z-index: 2000; transform: translateX(-100%);
    transition: transform 0.3s ease; padding: 40px 20px;
    display: flex; flex-direction: column; gap: 15px; align-items: center;
}
#panel.open { transform: translateX(0); }

/* 패널 내 버튼 공통 */
.p-btn {
    width: 100%; padding: 15px; border: none; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    font-size: 16px; font-weight: bold; cursor: pointer;
    box-shadow: 0 4px 4px rgba(0,0,0,0.2);
}

/* 이미지의 노란색 기록 버튼 */
#btn-record { background: yellow; color: black; margin-bottom: 20px; position: relative; }
#btn-record::before { content: '◀'; position: absolute; left: 15px; color: red; }

/* 빨간색 보조 버튼들 */
.btn-red { background: #ff4d4d; color: black; }
.btn-dot { width: 18px; height: 18px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.2); }

/* 마커 스타일 */
.player-marker { width: 15px; height: 15px; background: yellow; border: 2px solid black; border-radius: 50%; }
</style>
</head>
<body>

<div id="map"></div>
<canvas id="fog-canvas"></canvas>

<button id="ham-btn" onclick="togglePanel()">
    <div class="hline"></div>
    <div class="hline"></div>
    <div class="hline"></div>
</button>

<div id="stop-btn">
    <div class="stop-icon"></div> 중단
</div>

<div id="stats-panel">
    오늘 걸은 거리 13km<br>
    새로운 길 5km
</div>

<div id="floating-btns">
    <div id="btn-red-tri"></div>
    <div id="btn-loc-circle" onclick="centerOnMe()">
        <div class="inner-dot"></div>
    </div>
</div>

<div id="panel">
    <button class="p-btn" id="btn-record" onclick="togglePanel()">기록</button>
    
    <button class="p-btn btn-red" onclick="centerOnMe();togglePanel()">
        <div class="btn-dot" style="background: yellow; border: 2px solid red;"></div> 현 위치로
    </button>
    
    <button class="p-btn btn-red">
        <div class="btn-dot" style="background: blue;"></div> 자전거 보관
    </button>
    
    <button class="p-btn btn-red">
        <div class="btn-dot" style="background: lime;"></div> 사진 명소
    </button>
    
    <button class="p-btn btn-red">
        <div class="btn-dot" style="background: magenta;"></div> 선물 살 곳
    </button>
    
    <button class="p-btn btn-red" style="margin-top: 10px; font-size: 13px;">
        <div class="btn-dot" style="background: #444; display: flex; flex-wrap: wrap; gap: 2px; padding: 2px;">
            <div style="width:4px;height:4px;background:red;border-radius:50%"></div>
            <div style="width:4px;height:4px;background:blue;border-radius:50%"></div>
            <div style="width:4px;height:4px;background:green;border-radius:50%"></div>
        </div> 오래된 기억들
    </button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// 지도 초기화
const map = L.map('map', { zoomControl:false, attributionControl:false }).setView([37.5665, 126.9780], 16);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

let currentPos = [37.5665, 126.9780];

// 플레이어 마커 (이미지 처럼 노란 점)
const playerIcon = L.divIcon({ className: '', html: '<div class="player-marker"></div>', iconSize: [15, 15] });
const marker = L.marker(currentPos, { icon: playerIcon }).addTo(map);

// 이미지에 있는 경로선 (반투명한 노란색 굵은 선)
const pathPoints = [
    [37.5645, 126.9750],
    [37.5655, 126.9765],
    [37.5665, 126.9780]
];
L.polyline(pathPoints, { color: 'yellow', weight: 15, opacity: 0.3 }).addTo(map);

// 이미지에 있는 포인트 마커들
const points = [
    { loc: [37.5645, 126.9750], color: 'lime' },
    { loc: [37.5652, 126.9760], color: 'magenta' },
    { loc: [37.5658, 126.9770], color: 'blue' }
];

points.forEach(p => {
    const icon = L.divIcon({ 
        className: '', 
        html: `<div style="width:12px;height:12px;background:${p.color};border-radius:50%;border:1px solid white;"></div>` 
    });
    L.marker(p.loc, { icon }).addTo(map);
});

// UI 기능
function togglePanel() {
    document.getElementById('panel').classList.toggle('open');
}

function centerOnMe() {
    map.panTo(currentPos);
}

// 안개 효과 (Canvas) - 간단 구현
const canvas = document.getElementById('fog-canvas');
const ctx = canvas.getContext('2d');
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    draw();
}
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // 현재 위치 주변만 밝게 (이미지 의도 반영)
    const p = map.latLngToContainerPoint(currentPos);
    ctx.globalCompositeOperation = 'destination-out';
    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 100);
    grad.addColorStop(0, 'rgba(0,0,0,1)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 100, 0, Math.PI*2);
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
}
window.addEventListener('resize', resize);
map.on('move', draw);
resize();

</script>
</body>
</html>
